<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>BigClaw Demo Simulator</title>
    <link rel="stylesheet" href="styles.css" />
    <style>
      .sim-wrap { display:grid; grid-template-columns: repeat(4,minmax(0,1fr)); gap:12px; }
      .sim-lane { border:1px solid var(--line); border-radius:14px; background:var(--panel); padding:12px; min-height:280px; }
      .sim-lane h3 { margin:0 0 10px; font-size:13px; color:var(--muted); text-transform:uppercase; letter-spacing:1px; }
      .sim-ticket { border:1px solid rgba(98,166,255,.35); background:rgba(98,166,255,.08); border-radius:10px; padding:10px; font-size:13px; margin-bottom:8px; cursor:pointer; transition:.2s ease; }
      .sim-ticket:hover { transform: translateY(-1px); }
      .sim-ticket.done { border-color:rgba(51,209,143,.5); background:rgba(51,209,143,.12); }
      .sim-ticket.alert { border-color:rgba(255,107,107,.55); background:rgba(255,107,107,.12); }
      .sim-toolbar { display:flex; gap:10px; flex-wrap:wrap; margin:14px 0 10px; }
      .sim-subtools { display:flex; gap:10px; flex-wrap:wrap; align-items:center; margin-bottom:18px; }
      .sim-subtools input, .sim-subtools select {
        border:1px solid var(--line); border-radius:10px; padding:8px 10px; color:var(--text); background:rgba(8,19,34,.6);
      }
      .sim-kpis { display:grid; grid-template-columns:repeat(4,minmax(0,1fr)); gap:10px; margin:12px 0 16px; }
      .sim-kpi { border:1px solid var(--line); border-radius:12px; padding:10px; background:rgba(8,19,34,.5); }
      .sim-kpi span { display:block; color:var(--muted); font-size:12px; }
      .sim-kpi strong { font-size:20px; }
      .sim-log { border:1px solid var(--line); border-radius:12px; background:rgba(8,19,34,.5); padding:12px; color:var(--muted); font-size:13px; max-height:220px; overflow:auto; }
      .pill { font-size:12px; color:var(--muted); }
      @media (max-width: 920px){ .sim-wrap{ grid-template-columns:repeat(2,minmax(0,1fr)); } .sim-kpis{grid-template-columns:repeat(2,minmax(0,1fr));} }
      @media (max-width: 640px){ .sim-wrap,.sim-kpis{ grid-template-columns:1fr; } }
    </style>
  </head>
  <body>
    <main class="container section" style="padding-top:72px">
      <p class="tag">Interactive Orchestration Simulation</p>
      <h1>BigClaw 任务编排模拟器</h1>
      <p class="subtitle">支持单任务触发、自动流转、失败回放和人工接管。点击 Ticket 可快速“重试一次”。</p>

      <div class="sim-kpis">
        <div class="sim-kpi"><span>Queued</span><strong id="kQueued">0</strong></div>
        <div class="sim-kpi"><span>Passed</span><strong id="kPassed">0</strong></div>
        <div class="sim-kpi"><span>Replay</span><strong id="kReplay">0</strong></div>
        <div class="sim-kpi"><span>Takeover</span><strong id="kTakeover">0</strong></div>
      </div>

      <div class="sim-toolbar">
        <button class="btn primary" id="startBtn">启动成功任务</button>
        <button class="btn" id="replayBtn">触发回放任务</button>
        <button class="btn" id="takeoverBtn">触发人工接管</button>
        <button class="btn" id="autoBtn">开启自动流量</button>
        <button class="btn" id="resetBtn">重置面板</button>
        <a class="btn" href="index.html">返回首页</a>
      </div>

      <div class="sim-subtools">
        <label class="pill">速度</label>
        <select id="speedSel">
          <option value="0.8">Fast</option>
          <option value="1" selected>Normal</option>
          <option value="1.4">Slow</option>
        </select>
        <label class="pill">任务前缀</label>
        <input id="prefix" value="TASK" />
      </div>

      <section class="sim-wrap" id="board">
        <div class="sim-lane"><h3>Queue</h3><div id="lane-queue"></div></div>
        <div class="sim-lane"><h3>Running</h3><div id="lane-running"></div></div>
        <div class="sim-lane"><h3>Gate</h3><div id="lane-gate"></div></div>
        <div class="sim-lane"><h3>Outcome</h3><div id="lane-outcome"></div></div>
      </section>

      <h2 style="margin-top:18px">Execution Log</h2>
      <div class="sim-log" id="log"></div>
    </main>

    <script>
      const lanes = {
        queue: document.getElementById('lane-queue'),
        running: document.getElementById('lane-running'),
        gate: document.getElementById('lane-gate'),
        outcome: document.getElementById('lane-outcome')
      };
      const logEl = document.getElementById('log');
      const metrics = { queued:0, passed:0, replay:0, takeover:0 };
      let seq = 300;
      let timer = null;

      const speed = () => Number(document.getElementById('speedSel').value || 1);
      const prefix = () => (document.getElementById('prefix').value || 'TASK').toUpperCase().replace(/\s+/g, '-');
      const wait = (ms) => ms * speed();

      const renderMetrics = () => {
        document.getElementById('kQueued').textContent = metrics.queued;
        document.getElementById('kPassed').textContent = metrics.passed;
        document.getElementById('kReplay').textContent = metrics.replay;
        document.getElementById('kTakeover').textContent = metrics.takeover;
      };

      const log = (msg) => {
        const t = new Date().toLocaleTimeString();
        const line = document.createElement('div');
        line.textContent = `[${t}] ${msg}`;
        logEl.prepend(line);
      };

      const makeTicket = (text, cls='') => {
        const el = document.createElement('div');
        el.className = `sim-ticket ${cls}`.trim();
        el.textContent = text;
        el.title = '点击重试该任务';
        el.addEventListener('click', () => {
          log(`${text.split(' · ')[0]} manual retry`);
          runOne('success');
        });
        return el;
      };

      const runOne = (mode='success') => {
        const id = `${prefix()}-${seq++}`;
        const q = makeTicket(`${id} · build orchestration plan`);
        lanes.queue.prepend(q);
        metrics.queued += 1;
        renderMetrics();
        log(`${id} queued`);

        setTimeout(() => {
          lanes.running.prepend(q);
          q.textContent = `${id} · worker executing`;
          log(`${id} running on worker cluster`);
        }, wait(700));

        setTimeout(() => {
          lanes.gate.prepend(q);
          q.textContent = `${id} · acceptance gate check`;
          log(`${id} reached acceptance gate`);
        }, wait(1500));

        setTimeout(() => {
          lanes.outcome.prepend(q);
          if (mode === 'success') {
            q.classList.add('done');
            q.textContent = `PASS · ${id} report exported`;
            metrics.passed += 1;
            log(`${id} passed and report exported`);
          } else if (mode === 'replay') {
            q.classList.add('alert');
            q.textContent = `REPLAY · ${id} policy mismatch`;
            metrics.replay += 1;
            log(`${id} routed to replay due to policy mismatch`);
          } else {
            q.classList.add('alert');
            q.textContent = `TAKEOVER · ${id} human review`;
            metrics.takeover += 1;
            log(`${id} escalated to human takeover`);
          }
          renderMetrics();
        }, wait(2300));
      };

      const autoToggle = () => {
        const btn = document.getElementById('autoBtn');
        if (timer) {
          clearInterval(timer);
          timer = null;
          btn.textContent = '开启自动流量';
          log('auto traffic stopped');
          return;
        }
        timer = setInterval(() => {
          const r = Math.random();
          if (r < 0.7) runOne('success');
          else if (r < 0.9) runOne('replay');
          else runOne('takeover');
        }, wait(2600));
        btn.textContent = '停止自动流量';
        log('auto traffic started');
      };

      const resetBoard = () => {
        Object.values(lanes).forEach((lane) => lane.innerHTML = '');
        Object.keys(metrics).forEach((k) => metrics[k] = 0);
        renderMetrics();
        log('board reset');
      };

      document.getElementById('startBtn').addEventListener('click', () => runOne('success'));
      document.getElementById('replayBtn').addEventListener('click', () => runOne('replay'));
      document.getElementById('takeoverBtn').addEventListener('click', () => runOne('takeover'));
      document.getElementById('autoBtn').addEventListener('click', autoToggle);
      document.getElementById('resetBtn').addEventListener('click', resetBoard);

      renderMetrics();
      log('Simulator ready');
    </script>
  </body>
</html>
